<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>先覚者タイプ診断 | Precursor Type Indicator</title>
<style>
:root {
  --bg-primary: #0a0e1a;
  --bg-secondary: #111827;
  --bg-card: #1a2035;
  --text-primary: #e8eaed;
  --text-secondary: #9ca3af;
  --accent-gold: #d4a843;
  --accent-blue: #3b82f6;
  --accent-teal: #14b8a6;
  --accent-red: #ef4444;
  --accent-orange: #f59e0b;
  --accent-purple: #8b5cf6;
  --accent-green: #10b981;
  --accent-pink: #f472b6;
  --border: rgba(255,255,255,0.08);
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'Segoe UI', -apple-system, 'Noto Sans JP', 'Noto Sans SC', sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
  min-height: 100vh;
  overflow-x: hidden;
}
.container { max-width: 640px; margin: 0 auto; padding: 20px; min-height: 100vh; }
.page { display:none; } .page.active { display:block; }

/* LANG SWITCHER */
.lang-switch { position:fixed; top:16px; right:16px; z-index:99; display:flex; gap:4px; background:var(--bg-card); border-radius:8px; padding:3px; border:1px solid var(--border); }
.lang-btn { padding:6px 14px; border:none; background:transparent; color:var(--text-secondary); font-size:13px; border-radius:6px; cursor:pointer; font-weight:600; transition:all .2s; }
.lang-btn.active { background:var(--accent-gold); color:#000; }

/* HOME */
.home-hero { text-align:center; padding:60px 20px 40px; }
.home-logo { font-size:13px; letter-spacing:6px; color:var(--accent-gold); text-transform:uppercase; margin-bottom:16px; }
.home-title { font-size:32px; font-weight:700; line-height:1.3; margin-bottom:8px; background:linear-gradient(135deg,var(--accent-gold),#fff,var(--accent-gold)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
.home-subtitle { font-size:14px; color:var(--text-secondary); margin-bottom:40px; line-height:1.7; }
.home-stats { display:flex; justify-content:center; gap:32px; margin-bottom:40px; }
.stat-item { text-align:center; }
.stat-num { font-size:24px; font-weight:700; color:var(--accent-gold); }
.stat-label { font-size:12px; color:var(--text-secondary); margin-top:4px; }
.btn-primary { display:inline-block; padding:16px 48px; background:linear-gradient(135deg,var(--accent-gold),#b8860b); color:#000; font-size:16px; font-weight:700; border:none; border-radius:12px; cursor:pointer; transition:all .3s; letter-spacing:2px; }
.btn-primary:hover { transform:translateY(-2px); box-shadow:0 8px 32px rgba(212,168,67,.3); }
.home-chars { display:flex; justify-content:center; flex-wrap:wrap; gap:8px; margin-top:40px; padding:0 20px; }
.char-icon-wrap { width:52px; height:52px; border-radius:50%; border:2px solid var(--border); overflow:hidden; transition:all .3s; background:var(--bg-card); }
.char-icon-wrap:hover { border-color:var(--accent-gold); transform:scale(1.1); }
.char-icon-wrap img { width:100%; height:100%; object-fit:cover; }
.char-icon-wrap .fallback { width:100%; height:100%; display:flex; align-items:center; justify-content:center; font-size:22px; }
.home-footer { text-align:center; margin-top:40px; font-size:12px; color:var(--text-secondary); opacity:.5; }

/* QUIZ */
.quiz-header { display:flex; align-items:center; justify-content:space-between; padding:16px 0; margin-bottom:20px; }
.quiz-back { background:none; border:none; color:var(--text-secondary); font-size:14px; cursor:pointer; padding:8px; }
.quiz-progress-text { font-size:14px; color:var(--accent-gold); font-weight:600; }
.progress-bar { width:100%; height:4px; background:var(--bg-card); border-radius:2px; margin-bottom:32px; overflow:hidden; }
.progress-fill { height:100%; background:linear-gradient(90deg,var(--accent-gold),var(--accent-teal)); border-radius:2px; transition:width .4s ease; }
.question-card { background:var(--bg-card); border-radius:16px; padding:28px 24px; border:1px solid var(--border); margin-bottom:24px; animation:fadeIn .4s ease; }
@keyframes fadeIn { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
.question-scenario { font-size:16px; line-height:1.7; margin-bottom:24px; text-align:center; padding:0 8px; }
.option-text { font-size:14px; line-height:1.6; padding:12px 16px; background:rgba(255,255,255,.03); border-radius:10px; text-align:center; }
.likert-scale { display:flex; justify-content:center; align-items:center; gap:6px; margin:20px 0; }
.likert-btn { border-radius:50%; border:2px solid var(--border); background:transparent; cursor:pointer; transition:all .2s; display:flex; align-items:center; justify-content:center; color:var(--text-secondary); font-size:12px; font-weight:600; }
.likert-btn:hover { border-color:var(--accent-gold); background:rgba(212,168,67,.1); }
.likert-btn.selected { border-color:var(--accent-gold); background:var(--accent-gold); color:#000; }
.likert-btn.pole-a { border-color:rgba(59,130,246,.5); }
.likert-btn.pole-a:hover,.likert-btn.pole-a.selected { background:var(--accent-blue); color:#fff; border-color:var(--accent-blue); }
.likert-btn.pole-b { border-color:rgba(20,184,166,.5); }
.likert-btn.pole-b:hover,.likert-btn.pole-b.selected { background:var(--accent-teal); color:#fff; border-color:var(--accent-teal); }
.likert-btn.neutral { border-color:rgba(156,163,175,.5); }
.likert-btn.neutral.selected { background:var(--text-secondary); color:#000; }
.sz-3{width:48px;height:48px;font-size:14px} .sz-2{width:42px;height:42px} .sz-1{width:36px;height:36px} .sz-0{width:30px;height:30px;font-size:11px}
.likert-labels { display:flex; justify-content:space-between; font-size:11px; color:var(--text-secondary); margin-top:8px; }

/* RESULT */
.result-hero { text-align:center; padding:40px 0 20px; }
.result-archetype { font-size:13px; letter-spacing:3px; color:var(--accent-gold); margin-bottom:12px; }
.result-icon-large { width:120px; height:120px; border-radius:50%; border:3px solid var(--accent-gold); margin:0 auto 16px; overflow:hidden; background:var(--bg-card); box-shadow:0 0 40px rgba(212,168,67,.2); }
.result-icon-large img { width:100%; height:100%; object-fit:cover; }
.result-icon-large .fallback { width:100%; height:100%; display:flex; align-items:center; justify-content:center; font-size:56px; }
.result-char-name { font-size:36px; font-weight:800; margin-bottom:4px; }
.result-char-en { font-size:16px; color:var(--text-secondary); letter-spacing:4px; margin-bottom:20px; }
.result-code { display:inline-block; padding:8px 20px; background:rgba(212,168,67,.1); border:1px solid var(--accent-gold); border-radius:8px; font-family:monospace; font-size:18px; font-weight:700; letter-spacing:4px; color:var(--accent-gold); margin-bottom:24px; }
.result-quote { font-size:14px; font-style:italic; color:var(--text-secondary); line-height:1.8; padding:0 20px; margin-bottom:32px; }
.result-splash { width:100%; max-width:400px; margin:0 auto 32px; border-radius:16px; overflow:hidden; border:1px solid var(--border); }
.result-splash img { width:100%; display:block; }
.dim-bars { display:flex; flex-direction:column; gap:16px; margin-bottom:24px; }
.dim-row { display:flex; align-items:center; gap:6px; }
.dim-label { font-size:11px; font-weight:600; width:56px; text-align:right; flex-shrink:0; }
.dim-bar-wrap { flex:1; height:8px; background:rgba(255,255,255,.05); border-radius:4px; position:relative; overflow:hidden; }
.dim-bar-a,.dim-bar-b { position:absolute; top:0; height:100%; border-radius:4px; transition:width 1s ease; }
.dim-bar-a { right:50%; border-radius:4px 0 0 4px; }
.dim-bar-b { left:50%; border-radius:0 4px 4px 0; }
.dim-center { position:absolute; left:50%; top:-2px; width:2px; height:12px; background:rgba(255,255,255,.2); transform:translateX(-50%); }
.dim-pct { font-size:11px; font-weight:600; width:36px; text-align:center; flex-shrink:0; }
.dim-label-r { font-size:11px; font-weight:600; width:56px; text-align:left; flex-shrink:0; }
.result-section { background:var(--bg-card); border-radius:16px; padding:24px; border:1px solid var(--border); margin-bottom:16px; }
.result-section h3 { font-size:16px; margin-bottom:16px; display:flex; align-items:center; gap:8px; }
.result-section p { font-size:14px; line-height:1.8; color:var(--text-secondary); margin-bottom:12px; }
.result-section p:last-child { margin-bottom:0; }
.tags { display:flex; flex-wrap:wrap; gap:8px; margin-top:8px; }
.tag { padding:4px 12px; border-radius:20px; font-size:12px; }
.tag-s { background:rgba(212,168,67,.1); color:var(--accent-gold); }
.tag-w { background:rgba(239,68,68,.1); color:var(--accent-red); }
.tag-r { background:rgba(20,184,166,.1); color:var(--accent-teal); }
.result-actions { display:flex; gap:12px; margin-top:32px; flex-wrap:wrap; }
.btn-secondary { flex:1; min-width:130px; padding:14px 16px; background:var(--bg-card); border:1px solid var(--border); border-radius:12px; color:var(--text-primary); font-size:14px; font-weight:600; cursor:pointer; transition:all .2s; text-align:center; }
.btn-secondary:hover { border-color:var(--accent-gold); background:rgba(212,168,67,.05); }
.toast { position:fixed; bottom:80px; left:50%; transform:translateX(-50%) translateY(20px); background:var(--accent-gold); color:#000; padding:10px 24px; border-radius:8px; font-size:14px; font-weight:600; opacity:0; transition:all .3s; pointer-events:none; z-index:100; }
.toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
@media(max-width:420px){
  .home-title{font-size:26px}
  .likert-scale{gap:4px}
  .sz-3{width:42px;height:42px} .sz-2{width:38px;height:38px} .sz-1{width:34px;height:34px} .sz-0{width:28px;height:28px}
  .dim-label,.dim-label-r{width:44px;font-size:10px}
}
</style>
</head>
<body>

<div class="lang-switch">
  <button class="lang-btn active" onclick="setLang('ja')">日本語</button>
  <button class="lang-btn" onclick="setLang('zh')">中文</button>
</div>

<div class="container">
  <div id="page-home" class="page active">
    <div class="home-hero">
      <div class="home-logo">PRECURSOR TYPE INDICATOR</div>
      <h1 class="home-title" id="home-title"></h1>
      <p class="home-subtitle" id="home-subtitle"></p>
      <div class="home-stats">
        <div class="stat-item"><div class="stat-num">36</div><div class="stat-label" data-i="stat_q"></div></div>
        <div class="stat-item"><div class="stat-num">10</div><div class="stat-label" data-i="stat_c"></div></div>
        <div class="stat-item"><div class="stat-num">4</div><div class="stat-label" data-i="stat_d"></div></div>
      </div>
      <button class="btn-primary" id="btn-start" onclick="startQuiz()"></button>
      <div class="home-chars" id="home-chars"></div>
    </div>
    <div class="home-footer">Precursor Type Indicator v1.0</div>
  </div>
  <div id="page-quiz" class="page">
    <div class="quiz-header">
      <button class="quiz-back" onclick="goHome()" data-i="back"></button>
      <span class="quiz-progress-text" id="q-prog">1 / 36</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill" style="width:0%"></div></div>
    <div id="q-area"></div>
  </div>
  <div id="page-result" class="page"><div id="r-content"></div></div>
</div>
<div class="toast" id="toast"></div>

function t(k){ return I18N[LANG][k]||k; }
function setLang(l){
  LANG=l;

}
function applyI18N(){
  document.getElementById('home-title').textContent=t('title');

  document.getElementById('btn-start').textContent=t('start');
  document.querySelectorAll('[data-i]').forEach(el=>{ el.textContent=t(el.dataset.i); });
  document.title = t('title') + ' | Precursor Type Indicator';
}

const QORDER=[1,19,10,28,5,23,15,33,2,20,11,29,8,25,17,35,3,21,12,30,6,24,14,31,9,27,18,36,4,22,13,32,7,26,16,34];

// ===== STATE =====
let curQ=0, ans={};

// ===== IMAGE HELPERS =====
function iconHTML(c,size){
  return `<img src="${c.icon}" onerror="this.parentElement.innerHTML='<span class=fallback>${c.fb}</span>'" style="width:100%;height:100%;object-fit:cover">`;
}
function splashHTML(c){
  return `<img src="${c.splash}" onerror="this.parentElement.style.display='none'" style="width:100%;display:block">`;
}

// ===== INIT =====
function init(){
  applyI18N();
  const el=document.getElementById('home-chars');
  el.innerHTML=Object.values(C).map(c=>`<div class="char-icon-wrap" title="${c[LANG==='ja'?'ja':'zh']}">${iconHTML(c)}</div>`).join('');
}
function showPage(id){document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));document.getElementById('page-'+id).classList.add('active');window.scrollTo(0,0);}
function goHome(){showPage('home');curQ=0;ans={};}
function startQuiz(){curQ=0;ans={};showPage('quiz');renderQ();}

// ===== QUIZ =====
function renderQ(){
  const qId=QORDER[curQ],q=Q.find(x=>x.id===qId),total=QORDER.length;
  const dm=DIM.find(d=>d.id===q.d);
  const L=LANG;
  document.getElementById('q-prog').textContent=`${curQ+1} / ${total}`;
  document.getElementById('prog-fill').style.width=`${(curQ/total)*100}%`;
  const scenario=L==='ja'?q.ja:q.zh, oA=L==='ja'?q.aJ:q.aZ, oB=L==='ja'?q.bJ:q.bZ;
  const lA=L==='ja'?dm.lA_ja:dm.lA_zh, lB=L==='ja'?dm.lB_ja:dm.lB_zh;
  const prev=ans[qId];
  document.getElementById('q-area').innerHTML=`
    <div class="question-card">
      <div class="question-scenario">${scenario}</div>
      <div class="option-text" style="border-left:3px solid ${dm.cA}">${oA}</div>
      <div class="likert-scale">
        ${[-3,-2,-1,0,1,2,3].map(v=>{
          const ab=Math.abs(v);
          const cls=v<0?'pole-a':v>0?'pole-b':'neutral';
          const sz='sz-'+ab;
          const sel=prev===v?'selected':'';
          const lb=ab===3?(L==='ja'?'強':'强'):ab===0?(L==='ja'?'中':'中'):'';
          return `<button class="likert-btn ${cls} ${sz} ${sel}" onclick="pickAns(${qId},${v},this)">${lb}</button>`;
        }).join('')}
      </div>
      <div class="option-text" style="border-left:3px solid ${dm.cB}">${oB}</div>
      <div class="likert-labels"><span style="color:${dm.cA}">← ${dm.pA}</span><span style="color:${dm.cB}">${dm.pB} →</span></div>
    </div>`;
}
function pickAns(qId,val,el){
  ans[qId]=val;
  el.parentElement.querySelectorAll('.likert-btn').forEach(b=>b.classList.remove('selected'));
  el.classList.add('selected');
  setTimeout(()=>{
    if(curQ<QORDER.length-1){curQ++;renderQ();}
    else calc();
  },300);
}

// ===== CALC =====
function calc(){
  const ds={};
  DIM.forEach(d=>{
    const qs=Q.filter(q=>q.d===d.id);
    let sum=0,cnt=0;
    qs.forEach(q=>{if(ans[q.id]!==undefined){sum+=ans[q.id];cnt++;}});
    const mx=cnt*3;
    ds[d.id]=mx>0?Math.round(50+(sum/mx)*50):50;
  });
  let best=null,bestS=-Infinity;
  Object.values(C).forEach(c=>{
    let sc=0;
    DIM.forEach(d=>{
      const exp=50-(c.w[d.id]/2);
      const diff=ds[d.id]-exp;
      sc-=diff*diff;
    });
    if(sc>bestS){bestS=sc;best=c;}
  });
  showResult(best,ds);
}

// ===== RESULT =====
function showResult(ch,ds){
  const L=LANG,ar=ARCH[ch.arch],a=ch.a[L];
  document.getElementById('prog-fill').style.width='100%';
  const code=DIM.map(d=>ds[d.id]<=50?d.pA[0]:d.pB[0]).join(' - ');
  const dimH=DIM.map(d=>{
    const pctB=ds[d.id],pctA=100-pctB;
    const wA=Math.max(0,(pctA-50)*2),wB=Math.max(0,(pctB-50)*2);
    const lA=L==='ja'?d.lA_ja:d.lA_zh,lB=L==='ja'?d.lB_ja:d.lB_zh;
    const dominant=pctA>=pctB;
    const dpct=dominant?pctA:pctB;
    const dcol=dominant?d.cA:d.cB;
    return `<div class="dim-row">
      <div class="dim-label" style="color:${d.cA}">${d.pA}<br><span style="font-weight:400;font-size:10px">${lA}</span></div>
      <div class="dim-bar-wrap">
        <div class="dim-bar-a" style="width:${wA}%;background:${d.cA}"></div>
        <div class="dim-bar-b" style="width:${wB}%;background:${d.cB}"></div>
        <div class="dim-center"></div>
      </div>
      <div class="dim-pct" style="color:${dcol}">${dpct}%</div>
      <div class="dim-label-r" style="color:${d.cB}">${d.pB}<br><span style="font-weight:400;font-size:10px">${lB}</span></div>
    </div>`;
  }).join('');
  const name=L==='ja'?ch.ja:ch.zh;
  const quote=L==='ja'?ch.quote_ja:ch.quote_zh;
  const archName=ar[L];
  document.getElementById('r-content').innerHTML=`
    <div class="result-hero">
      <div class="result-archetype">${archName}</div>
      <div class="result-icon-large" style="border-color:${ar.color}">${iconHTML(ch)}</div>
      <div class="result-char-name">${name}</div>
      <div class="result-char-en">${ch.en}</div>
      <div class="result-code">${code}</div>
      <div class="result-quote">"${quote}"</div>
    </div>
    <div class="result-splash" id="r-splash">${splashHTML(ch)}</div>
    <div class="result-section"><h3>${t('sec_dim')}</h3><div class="dim-bars">${dimH}</div></div>
    <div class="result-section"><h3>${t('sec_personality')}</h3><p>${a.desc.replace(/\n/g,'</p><p>')}</p></div>
    <div class="result-section"><h3>${t('sec_drive')}</h3><p><strong>${t('drive_label')}：</strong>${a.drive}</p><p><strong>${t('stress_label')}：</strong>${a.stress}</p></div>
    <div class="result-section"><h3>${t('sec_str')}</h3><div class="tags">${a.str.map(s=>`<span class="tag tag-s">${s}</span>`).join('')}</div><div class="tags" style="margin-top:8px">${a.weak.map(w=>`<span class="tag tag-w">${w}</span>`).join('')}</div></div>
    <div class="result-section"><h3>${t('sec_rel')}</h3><div class="tags">${a.rel.map(r=>`<span class="tag tag-r">${r}</span>`).join('')}</div></div>
    <div class="result-actions">
      <button class="btn-secondary" onclick="copyR('${ch.id}')">${t('copy')}</button>
      <button class="btn-primary" style="flex:1;min-width:130px" onclick="startQuiz()">${t('retry')}</button>
    </div>
    <div style="height:40px"></div>`;
  showPage('result');
  setTimeout(()=>{
    document.querySelectorAll('.dim-bar-a,.dim-bar-b').forEach(b=>{const w=b.style.width;b.style.width='0%';setTimeout(()=>b.style.width=w,50);});
  },100);
}
function copyR(id){
  const ch=C[id],L=LANG,ar=ARCH[ch.arch];
  const name=L==='ja'?ch.ja:ch.zh;
  const txt=t('copy_tpl').replace('{arch}',ar[L]).replace('{name}',name).replace('{en}',ch.en).replace('{code}',document.querySelector('.result-code').textContent);
  navigator.clipboard.writeText(txt).then(()=>showToast(t('copied'))).catch(()=>showToast(t('copy_fail')));
}
function showToast(m){const el=document.getElementById('toast');el.textContent=m;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),2000);}
init();
</script>
</body>
</html>
