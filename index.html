<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>先覚者タイプ診断 | Precursor Type Indicator</title>
<style>
:root {
  --bg-primary: #f5f0eb;
  --bg-secondary: #ede7e0;
  --bg-card: rgba(255,255,255,0.82);
  --text-primary: #1a1a2e;
  --text-secondary: #5a5a72;
  --accent-gold: #b8860b;
  --accent-blue: #2563eb;
  --accent-teal: #0d9488;
  --accent-red: #dc2626;
  --accent-orange: #d97706;
  --accent-purple: #7c3aed;
  --accent-green: #059669;
  --accent-pink: #db2777;
  --border: rgba(0,0,0,0.08);
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'Segoe UI', -apple-system, 'Noto Sans JP', 'Noto Sans SC', sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
  min-height: 100vh;
  overflow-x: hidden;
  position: relative;
}
body::before {
  content: '';
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: url('bg.jpg') center center / cover no-repeat fixed;
  opacity: 0.12;
  z-index: 0;
  pointer-events: none;
}
body::after {
  content: '';
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: radial-gradient(ellipse at 30% 20%, rgba(184,134,11,0.06) 0%, transparent 60%),
              radial-gradient(ellipse at 70% 80%, rgba(13,148,136,0.04) 0%, transparent 60%);
  z-index: 0;
  pointer-events: none;
}
.container { max-width: 640px; margin: 0 auto; padding: 20px; min-height: 100vh; position: relative; z-index: 1; }
.page { display:none; } .page.active { display:block; }

/* LANG SWITCHER */
.lang-switch { position:fixed; top:16px; right:16px; z-index:99; display:flex; gap:4px; background:rgba(255,255,255,0.85); backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px); border-radius:8px; padding:3px; border:1px solid var(--border); box-shadow:0 2px 8px rgba(0,0,0,0.08); }
.lang-btn { padding:6px 14px; border:none; background:transparent; color:var(--text-secondary); font-size:13px; border-radius:6px; cursor:pointer; font-weight:600; transition:all .2s; }
.lang-btn.active { background:var(--accent-gold); color:#fff; }

/* HOME */
.home-hero { text-align:center; padding:60px 20px 40px; }
.home-logo { font-size:13px; letter-spacing:6px; color:var(--accent-gold); text-transform:uppercase; margin-bottom:16px; }
.home-title { font-size:32px; font-weight:700; line-height:1.3; margin-bottom:8px; background:linear-gradient(135deg,#8B6914,var(--text-primary),#8B6914); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
.home-subtitle { font-size:14px; color:var(--text-secondary); margin-bottom:40px; line-height:1.7; }
.home-stats { display:flex; justify-content:center; gap:32px; margin-bottom:40px; }
.stat-item { text-align:center; }
.stat-num { font-size:24px; font-weight:700; color:var(--accent-gold); }
.stat-label { font-size:12px; color:var(--text-secondary); margin-top:4px; }
.btn-primary { display:inline-block; padding:16px 48px; background:linear-gradient(135deg,var(--accent-gold),#8B6914); color:#fff; font-size:16px; font-weight:700; border:none; border-radius:12px; cursor:pointer; transition:all .3s; letter-spacing:2px; }
.btn-primary:hover { transform:translateY(-2px); box-shadow:0 8px 32px rgba(184,134,11,.25); }
.home-chars { display:flex; justify-content:center; flex-wrap:wrap; gap:8px; margin-top:40px; padding:0 20px; }
.char-icon-wrap { width:52px; height:52px; border-radius:50%; border:2px solid var(--border); overflow:hidden; transition:all .3s; background:rgba(255,255,255,0.6); }
.char-icon-wrap:hover { border-color:var(--accent-gold); transform:scale(1.1); }
.char-icon-wrap img { width:100%; height:100%; object-fit:cover; }
.char-icon-wrap .fallback { width:100%; height:100%; display:flex; align-items:center; justify-content:center; font-size:22px; }
.home-footer { text-align:center; margin-top:40px; font-size:12px; color:var(--text-secondary); opacity:.5; }

/* QUIZ */
.quiz-header { display:flex; align-items:center; justify-content:space-between; padding:16px 0; margin-bottom:20px; }
.quiz-back { background:none; border:none; color:var(--text-secondary); font-size:14px; cursor:pointer; padding:8px; }
.quiz-prev { background:none; border:1px solid var(--border); color:var(--text-secondary); font-size:14px; cursor:pointer; padding:6px 14px; border-radius:8px; transition:all .2s; }
.quiz-prev:hover { border-color:var(--accent-gold); color:var(--text-primary); }
.quiz-progress-text { font-size:14px; color:var(--accent-gold); font-weight:600; }
.progress-bar { width:100%; height:4px; background:rgba(0,0,0,.06); border-radius:2px; margin-bottom:32px; overflow:hidden; }
.progress-fill { height:100%; background:linear-gradient(90deg,var(--accent-gold),var(--accent-teal)); border-radius:2px; transition:width .4s ease; }
.question-card { background:rgba(255,255,255,0.82); backdrop-filter:blur(16px); -webkit-backdrop-filter:blur(16px); border-radius:16px; padding:28px 24px; border:1px solid var(--border); margin-bottom:24px; animation:fadeIn .4s ease; box-shadow:0 2px 16px rgba(0,0,0,0.06); }
@keyframes fadeIn { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
.question-scenario { font-size:16px; line-height:1.7; margin-bottom:24px; text-align:center; padding:0 8px; }

.choice-row { display:flex; flex-direction:column; gap:10px; margin-bottom:20px; }
.choice-block { display:flex; align-items:flex-start; gap:10px; padding:14px 16px; border-radius:12px; border:1px solid; background:rgba(255,255,255,0.5); }
.choice-label { font-size:14px; font-weight:800; flex-shrink:0; min-width:20px; padding-top:1px; }
.choice-text { font-size:14px; line-height:1.6; color:var(--text-primary); }

.scale-area { margin-top:4px; }
.scale-hint { font-size:11px; margin-bottom:6px; margin-top:6px; opacity:.7; }
.likert-scale { display:flex; justify-content:center; align-items:center; gap:6px; margin:8px 0; }

.option-text { font-size:14px; line-height:1.6; padding:12px 16px; background:rgba(255,255,255,.03); border-radius:10px; text-align:center; }
.likert-btn { border-radius:50%; border:2px solid var(--border); background:transparent; cursor:pointer; transition:all .2s; display:flex; align-items:center; justify-content:center; color:var(--text-secondary); font-size:12px; font-weight:600; }
.likert-btn.selected { color:#000; }
.sz-3{width:48px;height:48px;font-size:14px} .sz-2{width:42px;height:42px} .sz-1{width:36px;height:36px} .sz-0{width:30px;height:30px;font-size:11px}
.likert-labels { display:flex; justify-content:space-between; font-size:11px; color:var(--text-secondary); margin-top:8px; }

/* RESULT */
.result-hero { text-align:center; padding:40px 0 20px; }
.result-archetype { font-size:13px; letter-spacing:3px; color:var(--accent-gold); margin-bottom:12px; }
.result-icon-large { width:120px; height:120px; border-radius:50%; border:3px solid var(--accent-gold); margin:0 auto 16px; overflow:hidden; background:rgba(255,255,255,0.6); box-shadow:0 4px 24px rgba(184,134,11,.15); }
.result-icon-large img { width:100%; height:100%; object-fit:cover; }
.result-icon-large .fallback { width:100%; height:100%; display:flex; align-items:center; justify-content:center; font-size:56px; }
.result-char-name { font-size:36px; font-weight:800; margin-bottom:4px; }
.result-char-en { font-size:16px; color:var(--text-secondary); letter-spacing:4px; margin-bottom:20px; }
.result-code { display:inline-block; padding:8px 20px; background:rgba(184,134,11,.08); border:1px solid var(--accent-gold); border-radius:8px; font-family:monospace; font-size:18px; font-weight:700; letter-spacing:4px; color:var(--accent-gold); margin-bottom:12px; }
.result-pct { font-size:13px; color:var(--text-secondary); margin-bottom:20px; }
.result-quote { font-size:14px; font-style:italic; color:var(--text-secondary); line-height:1.8; padding:0 20px; margin-bottom:32px; }
.result-splash { width:100%; max-width:400px; margin:0 auto 32px; border-radius:16px; overflow:hidden; border:1px solid var(--border); }
.result-splash img { width:100%; display:block; }
.dim-bars { display:flex; flex-direction:column; gap:16px; margin-bottom:24px; }
.dim-row { display:flex; align-items:center; gap:6px; }
.dim-label { font-size:11px; font-weight:600; width:56px; text-align:right; flex-shrink:0; }
.dim-bar-wrap { flex:1; height:8px; background:rgba(0,0,0,.06); border-radius:4px; position:relative; overflow:hidden; }
.dim-bar-a,.dim-bar-b { position:absolute; top:0; height:100%; border-radius:4px; transition:width 1s ease; }
.dim-bar-a { right:50%; border-radius:4px 0 0 4px; }
.dim-bar-b { left:50%; border-radius:0 4px 4px 0; }
.dim-center { position:absolute; left:50%; top:-2px; width:2px; height:12px; background:rgba(0,0,0,.12); transform:translateX(-50%); }
.dim-pct { font-size:11px; font-weight:600; width:36px; text-align:center; flex-shrink:0; }
.dim-label-r { font-size:11px; font-weight:600; width:56px; text-align:left; flex-shrink:0; }
.result-section { background:rgba(255,255,255,0.82); backdrop-filter:blur(16px); -webkit-backdrop-filter:blur(16px); border-radius:16px; padding:24px; border:1px solid var(--border); margin-bottom:16px; box-shadow:0 2px 16px rgba(0,0,0,0.06); }
.result-section h3 { font-size:16px; margin-bottom:16px; display:flex; align-items:center; gap:8px; }
.result-section p { font-size:14px; line-height:1.8; color:var(--text-secondary); margin-bottom:12px; }
.result-section p:last-child { margin-bottom:0; }
.tags { display:flex; flex-wrap:wrap; gap:8px; margin-top:8px; }
.tag { padding:4px 12px; border-radius:20px; font-size:12px; }
.tag-s { background:rgba(212,168,67,.1); color:var(--accent-gold); }
.tag-w { background:rgba(239,68,68,.1); color:var(--accent-red); }
.tag-r { background:rgba(20,184,166,.1); color:var(--accent-teal); }
.result-actions { display:flex; gap:12px; margin-top:32px; flex-wrap:wrap; }
.btn-secondary { flex:1; min-width:130px; padding:14px 16px; background:rgba(255,255,255,0.8); border:1px solid var(--border); border-radius:12px; color:var(--text-primary); font-size:14px; font-weight:600; cursor:pointer; transition:all .2s; text-align:center; }
.btn-secondary:hover { border-color:var(--accent-gold); background:rgba(184,134,11,.05); }
.toast { position:fixed; bottom:80px; left:50%; transform:translateX(-50%) translateY(20px); background:var(--accent-gold); color:#fff; padding:10px 24px; border-radius:8px; font-size:14px; font-weight:600; opacity:0; transition:all .3s; pointer-events:none; z-index:100; }
.toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
@media(max-width:420px){
  .home-title{font-size:26px}
  .likert-scale{gap:4px}
  .sz-3{width:42px;height:42px} .sz-2{width:38px;height:38px} .sz-1{width:34px;height:34px} .sz-0{width:28px;height:28px}
  .dim-label,.dim-label-r{width:44px;font-size:10px}
}
</style>
</head>
<body>

<div class="lang-switch">
  <button class="lang-btn active" onclick="setLang('ja')">日本語</button>
  <button class="lang-btn" onclick="setLang('zh')">中文</button>
</div>

<div class="container">
  <div id="page-home" class="page active">
    <div class="home-hero">
      <div class="home-logo">PRECURSOR TYPE INDICATOR</div>
      <h1 class="home-title" id="home-title"></h1>
      <p class="home-subtitle" id="home-subtitle"></p>
      <div class="home-stats">
        <div class="stat-item"><div class="stat-num">20</div><div class="stat-label" data-i="stat_q"></div></div>
        <div class="stat-item"><div class="stat-num">10</div><div class="stat-label" data-i="stat_c"></div></div>
        <div class="stat-item"><div class="stat-num">4</div><div class="stat-label" data-i="stat_d"></div></div>
      </div>
      <button class="btn-primary" id="btn-start" onclick="startQuiz()"></button>
      <div class="home-chars" id="home-chars"></div>
    </div>
    <div class="home-footer">Precursor Type Indicator v1.0</div>
  </div>
  <div id="page-quiz" class="page">
    <div class="quiz-header">
      <button class="quiz-back" onclick="goHome()" data-i="back"></button>
      <button class="quiz-prev" id="btn-prev" onclick="prevQ()" style="display:none">← <span data-i="prev_q"></span></button>
      <span class="quiz-progress-text" id="q-prog">1 / 20</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill" style="width:0%"></div></div>
    <div id="q-area"></div>
  </div>
  <div id="page-result" class="page"><div id="r-content"></div></div>
</div>
<div class="toast" id="toast"></div>

<script>

  }
};
function t(k){ return I18N[LANG][k]||k; }
function setLang(l){
  LANG=l;
  document.querySelectorAll('.lang-btn').forEach(b=>b.classList.toggle('active',b.textContent.includes(l==='ja'?'日':'中')));
  applyI18N();
}
function applyI18N(){
  document.getElementById('home-title').textContent=t('title');
  document.getElementById('home-subtitle').textContent=t('subtitle');
  document.getElementById('btn-start').textContent=t('start');
  document.querySelectorAll('[data-i]').forEach(el=>{ el.textContent=t(el.dataset.i); });
  document.title = t('title') + ' | Precursor Type Indicator';
}

const QORDER=[2,19,11,28,4,23,15,35,1,21,13,29,8,24,17,33,7,27,18,36];

// ===== STATE =====
let curQ=0, ans={};

// ===== IMAGE HELPERS =====
function iconHTML(c,size){
  return `<img src="${c.icon}" onerror="this.parentElement.innerHTML='<span class=fallback>${c.fb}</span>'" style="width:100%;height:100%;object-fit:cover">`;
}
function splashHTML(c){
  return `<img src="${c.splash}" onerror="this.parentElement.style.display='none'" style="width:100%;display:block">`;
}

// ===== INIT =====
function init(){
  applyI18N();
  const el=document.getElementById('home-chars');
  el.innerHTML=Object.values(C).map(c=>`<div class="char-icon-wrap" title="${c[LANG==='ja'?'ja':'zh']}">${iconHTML(c)}</div>`).join('');
}
function showPage(id){document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));document.getElementById('page-'+id).classList.add('active');window.scrollTo(0,0);}
function goHome(){showPage('home');curQ=0;ans={};}
function startQuiz(){curQ=0;ans={};showPage('quiz');renderQ();}
function prevQ(){if(curQ>0){curQ--;renderQ();}}

// ===== QUIZ =====
function renderQ(){
  const qId=QORDER[curQ],q=Q.find(x=>x.id===qId),total=QORDER.length;
  const dm=DIM.find(d=>d.id===q.d);
  const L=LANG;
  document.getElementById('q-prog').textContent=`${curQ+1} / ${total}`;
  document.getElementById('prog-fill').style.width=`${(curQ/total)*100}%`;
  document.getElementById('btn-prev').style.display=curQ>0?'inline-block':'none';
  const scenario=L==='ja'?q.ja:q.zh, oA=L==='ja'?q.aJ:q.aZ, oB=L==='ja'?q.bJ:q.bZ;
  const lA=L==='ja'?dm.lA_ja:dm.lA_zh, lB=L==='ja'?dm.lB_ja:dm.lB_zh;
  const prev=ans[qId];
  const agreeA = L==='ja'?'こちらに近い':'更认同这个';
  const agreeB = L==='ja'?'こちらに近い':'更认同这个';
  document.getElementById('q-area').innerHTML=`
    <div class="question-card">
      <div class="question-scenario">${scenario}</div>

      <div class="choice-row">
        <div class="choice-block choice-a" style="border-color:${dm.cA}">
          <div class="choice-label" style="color:${dm.cA}">A</div>
          <div class="choice-text">${oA}</div>
        </div>
        <div class="choice-block choice-b" style="border-color:${dm.cB}">
          <div class="choice-label" style="color:${dm.cB}">B</div>
          <div class="choice-text">${oB}</div>
        </div>
      </div>

      <div class="scale-area">
        <div class="scale-hint" style="color:${dm.cA}">← A ${agreeA}</div>
        <div class="likert-scale">
          ${[-3,-2,-1,0,1,2,3].map(v=>{
            const ab=Math.abs(v);
            const sz='sz-'+ab;
            const sel=prev===v?'selected':'';
            const pole=v<0?'a':v>0?'b':'n';
            const borderCol=v<0?dm.cA:v>0?dm.cB:'rgba(156,163,175,.5)';
            const bgCol=sel?(v===0?'var(--text-secondary)':(v<0?dm.cA:dm.cB)):'transparent';
            const txtCol=sel?'#000':'var(--text-secondary)';
            return `<button class="likert-btn ${sz} ${sel?'selected':''}" style="border-color:${borderCol};${sel?'background:'+bgCol+';color:'+txtCol:''}" onmouseover="this.style.borderColor='${v<0?dm.cA:v>0?dm.cB:borderCol}';this.style.background='${v<0?dm.cA+'22':v>0?dm.cB+'22':'rgba(156,163,175,.1)'}'" onmouseout="if(!this.classList.contains('selected')){this.style.background='transparent'}" onclick="pickAns(${qId},${v},this,'${dm.cA}','${dm.cB}')"></button>`;
          }).join('')}
        </div>
        <div class="scale-hint" style="color:${dm.cB};text-align:right">B ${agreeB} →</div>
      </div>

    </div>`;
}
function pickAns(qId,val,el,cA,cB){
  ans[qId]=val;
  const btns=el.parentElement.querySelectorAll('.likert-btn');
  btns.forEach((b,i)=>{
    b.classList.remove('selected');
    const bv=i-3;
    const borderCol=bv<0?cA:bv>0?cB:'rgba(156,163,175,.5)';
    b.style.borderColor=borderCol;
    b.style.background='transparent';
    b.style.color='var(--text-secondary)';
  });
  el.classList.add('selected');
  const selColor=val<0?cA:val>0?cB:'var(--text-secondary)';
  el.style.background=selColor;
  el.style.color='#000';
  el.style.borderColor=selColor;
  setTimeout(()=>{
    if(curQ<QORDER.length-1){curQ++;renderQ();}
    else calc();
  },300);
}

// ===== CALC =====
function calc(){
  const ds={};
  DIM.forEach(d=>{
    const qs=Q.filter(q=>q.d===d.id);
    let sum=0,cnt=0;
    qs.forEach(q=>{if(ans[q.id]!==undefined){sum+=ans[q.id];cnt++;}});
    const mx=cnt*3;
    ds[d.id]=mx>0?Math.round(50+(sum/mx)*50):50;
  });
  let best=null,bestS=-Infinity;
  Object.values(C).forEach(c=>{
    let sc=0;
    DIM.forEach(d=>{
      const exp=50-(c.w[d.id]/2);
      const diff=ds[d.id]-exp;
      sc-=diff*diff;
    });
    if(sc>bestS){bestS=sc;best=c;}
  });
  showResult(best,ds);
}

// ===== RESULT =====
function showResult(ch,ds){
  window._lastResult={ch,ds};
  const L=LANG,ar=ARCH[ch.arch],a=ch.a[L];
  document.getElementById('prog-fill').style.width='100%';
  const code=DIM.map(d=>ds[d.id]<=50?d.pA[0]:d.pB[0]).join(' - ');
  const dimH=DIM.map(d=>{
    const pctB=ds[d.id],pctA=100-pctB;
    const wA=Math.max(0,(pctA-50)*2),wB=Math.max(0,(pctB-50)*2);
    const lA=L==='ja'?d.lA_ja:d.lA_zh,lB=L==='ja'?d.lB_ja:d.lB_zh;
    const dominant=pctA>=pctB;
    const dpct=dominant?pctA:pctB;
    const dcol=dominant?d.cA:d.cB;
    return `<div class="dim-row">
      <div class="dim-label" style="color:${d.cA}">${d.pA}<br><span style="font-weight:400;font-size:10px">${lA}</span></div>
      <div class="dim-bar-wrap">
        <div class="dim-bar-a" style="width:${wA}%;background:${d.cA}"></div>
        <div class="dim-bar-b" style="width:${wB}%;background:${d.cB}"></div>
        <div class="dim-center"></div>
      </div>
      <div class="dim-pct" style="color:${dcol}">${dpct}%</div>
      <div class="dim-label-r" style="color:${d.cB}">${d.pB}<br><span style="font-weight:400;font-size:10px">${lB}</span></div>
    </div>`;
  }).join('');
  const name=L==='ja'?ch.ja:ch.zh;
  const quote=L==='ja'?ch.quote_ja:ch.quote_zh;
  const archName=ar[L];
  document.getElementById('r-content').innerHTML=`
    <div class="result-hero">
      <div class="result-archetype">${archName}</div>
      <div class="result-icon-large" style="border-color:${ar.color}">${iconHTML(ch)}</div>
      <div class="result-char-name">${name}</div>
      <div class="result-char-en">${ch.en}</div>
      <div class="result-code">${code}</div>
      <div class="result-pct">${L==='ja'?'約'+ch.pct+'%の人があなたと同じタイプ':'约'+ch.pct+'%的人与你是同一类型'}</div>
      <div class="result-quote">"${quote}"</div>
    </div>
    <div class="result-splash" id="r-splash">${splashHTML(ch)}</div>
    <div class="result-section"><h3>${t('sec_dim')}</h3><div class="dim-bars">${dimH}</div></div>
    <div class="result-section"><h3>${t('sec_personality')}</h3><p>${a.desc.replace(/\n/g,'</p><p>')}</p></div>
    <div class="result-section"><h3>${t('sec_drive')}</h3><p><strong>${t('drive_label')}：</strong>${a.drive}</p><p><strong>${t('stress_label')}：</strong>${a.stress}</p></div>
    <div class="result-section"><h3>${t('sec_str')}</h3><div class="tags">${a.str.map(s=>`<span class="tag tag-s">${s}</span>`).join('')}</div><div class="tags" style="margin-top:8px">${a.weak.map(w=>`<span class="tag tag-w">${w}</span>`).join('')}</div></div>
    <div class="result-section"><h3>${t('sec_rel')}</h3><div class="tags">${a.rel.map(r=>`<span class="tag tag-r">${r}</span>`).join('')}</div></div>
    <div class="result-actions">
      <button class="btn-secondary" onclick="copyR('${ch.id}')">${t('copy')}</button>
      <button class="btn-secondary" onclick="genShareCard()">🖼️ ${t('share_card')}</button>
      <button class="btn-primary" style="flex:1;min-width:130px" onclick="startQuiz()">${t('retry')}</button>
    </div>
    <div style="height:40px"></div>`;
  showPage('result');
  setTimeout(()=>{
    document.querySelectorAll('.dim-bar-a,.dim-bar-b').forEach(b=>{const w=b.style.width;b.style.width='0%';setTimeout(()=>b.style.width=w,50);});
  },100);
}
function copyR(id){
  const ch=C[id],L=LANG,ar=ARCH[ch.arch];
  const name=L==='ja'?ch.ja:ch.zh;
  const txt=t('copy_tpl').replace('{arch}',ar[L]).replace('{name}',name).replace('{en}',ch.en).replace('{code}',document.querySelector('.result-code').textContent);
  navigator.clipboard.writeText(txt).then(()=>showToast(t('copied'))).catch(()=>showToast(t('copy_fail')));
}
function showToast(m){const el=document.getElementById('toast');el.textContent=m;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),2000);}

// ===== SHARE CARD =====
function genShareCard(){
  const {ch,ds}=window._lastResult;
  const L=LANG, ar=ARCH[ch.arch];
  const name=L==='ja'?ch.ja:ch.zh;
  const quote=L==='ja'?ch.quote_ja:ch.quote_zh;
  const archName=ar[L];
  const code=DIM.map(d=>ds[d.id]<=50?d.pA:d.pB).join(' - ');

  const W=600, H=820;
  const cvs=document.createElement('canvas');
  cvs.width=W; cvs.height=H;
  const ctx=cvs.getContext('2d');

  // Background
  ctx.fillStyle='#f5f0eb';
  ctx.fillRect(0,0,W,H);

  // Card area
  const m=24;
  roundRect(ctx, m, m, W-m*2, H-m*2, 20, 'rgba(255,255,255,0.9)', 'rgba(0,0,0,0.06)');

  // Header line
  ctx.fillStyle=ar.color;
  ctx.fillRect(m, m, W-m*2, 4);

  // Archetype
  ctx.fillStyle=ar.color;
  ctx.font='600 13px sans-serif';
  ctx.textAlign='center';
  ctx.fillText(archName, W/2, 72);

  // Load icon and draw
  const icon=new Image();
  icon.crossOrigin='anonymous';
  icon.onload=function(){
    // Draw icon with circle clip - larger size for better display
    const cx=W/2, cy=148, radius=52;
    ctx.save();
    ctx.beginPath();
    ctx.arc(cx, cy, radius, 0, Math.PI*2);
    ctx.clip();
    // Calculate cover-fit: fill the circle completely
    const iw=icon.naturalWidth, ih=icon.naturalHeight;
    const scale=Math.max(radius*2/iw, radius*2/ih);
    const dw=iw*scale, dh=ih*scale;
    ctx.drawImage(icon, cx-dw/2, cy-dh/2, dw, dh);
    ctx.restore();
    // Circle border
    ctx.beginPath();
    ctx.arc(cx, cy, radius+1.5, 0, Math.PI*2);
    ctx.strokeStyle=ar.color;
    ctx.lineWidth=3;
    ctx.stroke();

    drawCardContent(ctx, W, H, ch, ds, name, quote, archName, code, ar, cvs);
  };
  icon.onerror=function(){
    // Fallback: draw emoji
    ctx.font='48px sans-serif';
    ctx.textAlign='center';
    ctx.fillText(ch.fb, W/2, 162);
    drawCardContent(ctx, W, H, ch, ds, name, quote, archName, code, ar, cvs);
  };
  icon.src=ch.icon;
}

function drawCardContent(ctx, W, H, ch, ds, name, quote, archName, code, ar, cvs){
  const L=LANG;
  // Character name
  ctx.fillStyle='#1a1a2e';
  ctx.font='bold 28px sans-serif';
  ctx.textAlign='center';
  ctx.fillText(name, W/2, 228);

  // EN name
  ctx.fillStyle='#5a5a72';
  ctx.font='500 14px sans-serif';
  ctx.fillText(ch.en, W/2, 250);

  // Code box
  ctx.font='bold 16px monospace';
  ctx.fillStyle=ar.color;
  const codeW=ctx.measureText(code).width+32;
  roundRect(ctx, (W-codeW)/2, 264, codeW, 32, 6, ar.color+'15', ar.color+'40');
  ctx.fillStyle=ar.color;
  ctx.fillText(code, W/2, 285);

  // Percentage
  ctx.fillStyle='#5a5a72';
  ctx.font='12px sans-serif';
  const pctText=L==='ja'?'約'+ch.pct+'%の人があなたと同じタイプ':'约'+ch.pct+'%的人与你是同一类型';
  ctx.fillText(pctText, W/2, 308);

  // Quote
  ctx.fillStyle='#5a5a72';
  ctx.font='italic 12px sans-serif';
  const qLines=wrapText(ctx, '"'+quote+'"', W-100);
  let qY=332;
  qLines.forEach(line=>{
    ctx.fillText(line, W/2, qY);
    qY+=18;
  });

  // Dimension bars
  let barY=qY+20;
  ctx.textAlign='left';
  DIM.forEach(d=>{
    const pctB=ds[d.id], pctA=100-pctB;
    const dominant=pctA>=pctB;
    const dpct=dominant?pctA:pctB;
    const dcol=dominant?d.cA:d.cB;
    const lA=L==='ja'?d.lA_ja:d.lA_zh;
    const lB=L==='ja'?d.lB_ja:d.lB_zh;

    // Labels
    ctx.font='600 11px sans-serif';
    ctx.fillStyle=d.cA;
    ctx.textAlign='left';
    ctx.fillText(d.pA, 48, barY);
    ctx.font='400 9px sans-serif';
    ctx.fillText(lA.split('・')[1]||lA.split('·')[1]||lA, 48, barY+12);

    ctx.font='600 11px sans-serif';
    ctx.fillStyle=d.cB;
    ctx.textAlign='right';
    ctx.fillText(d.pB, W-48, barY);
    ctx.font='400 9px sans-serif';
    ctx.fillText(lB.split('・')[1]||lB.split('·')[1]||lB, W-48, barY+12);

    // Bar background
    const bx=100, bw=W-200, by=barY-2, bh=8;
    ctx.fillStyle='rgba(0,0,0,0.06)';
    roundRectFill(ctx, bx, by, bw, bh, 4);

    // Bar fill
    const wA=Math.max(0,(pctA-50)*2);
    const wB=Math.max(0,(pctB-50)*2);
    if(wA>0){
      ctx.fillStyle=d.cA;
      roundRectFill(ctx, bx+bw/2-wA/100*bw/2, by, wA/100*bw/2, bh, 4);
    }
    if(wB>0){
      ctx.fillStyle=d.cB;
      roundRectFill(ctx, bx+bw/2, by, wB/100*bw/2, bh, 4);
    }

    // Percentage
    ctx.font='600 11px sans-serif';
    ctx.fillStyle=dcol;
    ctx.textAlign='center';
    ctx.fillText(dpct+'%', W/2, barY+12);

    barY+=36;
  });

  // Footer
  ctx.fillStyle='#aaa';
  ctx.font='11px sans-serif';
  ctx.textAlign='center';
  ctx.fillText('Precursor Type Indicator | himayo951852-bot.github.io/GRMBTI', W/2, H-40);

  // Show modal
  showCardModal(cvs);
}

function wrapText(ctx, text, maxW){
  const lines=[];
  let line='';
  for(let i=0;i<text.length;i++){
    const test=line+text[i];
    if(ctx.measureText(test).width>maxW && line.length>0){
      lines.push(line);
      line=text[i];
    } else {
      line=test;
    }
  }
  if(line) lines.push(line);
  return lines.length>3?lines.slice(0,3):lines;
}

function roundRect(ctx,x,y,w,h,r,fill,stroke){
  ctx.beginPath();
  ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();
  if(fill){ctx.fillStyle=fill;ctx.fill();}
  if(stroke){ctx.strokeStyle=stroke;ctx.lineWidth=1;ctx.stroke();}
}
function roundRectFill(ctx,x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();
  ctx.fill();
}

function showCardModal(cvs){
  // Remove old modal if exists
  const old=document.getElementById('share-modal');
  if(old) old.remove();

  const modal=document.createElement('div');
  modal.id='share-modal';
  modal.style.cssText='position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.6);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px)';
  modal.onclick=function(e){if(e.target===modal)modal.remove();};

  const wrap=document.createElement('div');
  wrap.style.cssText='background:#fff;border-radius:16px;padding:20px;max-width:360px;width:100%;text-align:center;box-shadow:0 8px 40px rgba(0,0,0,0.2)';

  const img=document.createElement('img');
  img.src=cvs.toDataURL('image/png');
  img.style.cssText='width:100%;border-radius:8px;margin-bottom:16px';

  const tip=document.createElement('p');
  tip.style.cssText='font-size:13px;color:#5a5a72;margin-bottom:12px';
  tip.textContent=LANG==='ja'?'長押しまたは右クリックで画像を保存':'长按或右键保存图片';

  const dlBtn=document.createElement('button');
  dlBtn.textContent=LANG==='ja'?'📥 画像を保存':'📥 保存图片';
  dlBtn.style.cssText='padding:12px 32px;background:linear-gradient(135deg,#b8860b,#8B6914);color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;width:100%';
  dlBtn.onclick=function(){
    const a=document.createElement('a');
    a.download='precursor-type-'+window._lastResult.ch.en+'.png';
    a.href=cvs.toDataURL('image/png');
    a.click();
    showToast(LANG==='ja'?'保存しました！':'已保存！');
  };

  const closeBtn=document.createElement('button');
  closeBtn.textContent='✕';
  closeBtn.style.cssText='position:absolute;top:12px;right:12px;background:none;border:none;font-size:20px;color:#999;cursor:pointer;padding:8px';
  closeBtn.onclick=function(){modal.remove();};

  wrap.style.position='relative';
  wrap.appendChild(closeBtn);
  wrap.appendChild(img);
  wrap.appendChild(tip);
  wrap.appendChild(dlBtn);
  modal.appendChild(wrap);
  document.body.appendChild(modal);
}

init();
</script>
